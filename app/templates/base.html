<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KRITIS Alarm & Dependency Lab – A PostgreSQL-backed research prototype for filtering industrial alarm messages, modelling critical-infrastructure dependencies, and supporting crisis-readiness analysis." />
  <title>{% block title %}KRITIS Alarm & Dependency Lab{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="{{ url_for('pages.index') }}">
        ⚡ KRITIS <span>Lab</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-1">
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.index' %}active{% endif %}" href="{{ url_for('pages.index') }}">📊 Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.alarms' %}active{% endif %}" href="{{ url_for('pages.alarms') }}">🚨 Alarms</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.incidents' %}active{% endif %}" href="{{ url_for('pages.incidents') }}">🔥 Incidents</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.dependencies' %}active{% endif %}" href="{{ url_for('pages.dependencies') }}">🕸 Dependencies</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.simulation' %}active{% endif %}" href="{{ url_for('pages.simulation') }}">⚙️ Simulation</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.readiness' %}active{% endif %}" href="{{ url_for('pages.readiness') }}">📋 Readiness</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'pages.bpmn' %}active{% endif %}" href="{{ url_for('pages.bpmn') }}">🔄 BPMN</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="container mt-5 mb-3 text-center" style="border-top:1px solid var(--border);padding-top:1rem;">
    <p class="text-muted" style="font-size:.8125rem;">
      KRITIS Alarm &amp; Dependency Lab &mdash; Research prototype &middot;
      <a href="/api/health" class="text-muted">API Health</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
